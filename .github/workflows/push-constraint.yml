name: "Force Explicit Push Constraint"

on:
  push:
    # Monitor pushes to all branches
    branches:
      - '**'

jobs:
  check-push-format:
    runs-on: ubuntu-latest
    steps:
      # 1. CRITICAL FIX: Fetch the repository files into the runner workspace
      - name: Checkout Code Base
        uses: actions/checkout@v4

      # 2. Analyze the metadata and enforce explicit push rules
      - name: "Analyze Git Push Metadata and Enforce Rules"
        run: |
          # Retrieve the accurate target remote branch name using GitHub context variable
          REMOTE_BRANCH="${{ github.ref_name }}"
          
          echo "======================================================================"
          echo "🔍 [OminiStudio Server Engine] Analyzing push metadata for branch: $REMOTE_BRANCH"
          echo "======================================================================"
          
          # 🛡️ BYPASS MECHANISM: If the target is the default branch (main/master), allow initialization and pass.
          if [ "$REMOTE_BRANCH" = "main" ] || [ "$REMOTE_BRANCH" = "master" ]; then
             echo "🚀 Default branch environment detected. Authentication approved."
             exit 0
          fi
          
          # 🚧 ENFORCEMENT ZONE: Rigidly block any implicit pushes to development/feature branches
          echo ""
          echo "🚨 [GitHub Server Action Hook] Security Review Mechanism Triggered!"
          echo "======================================================================"
          echo "Analysis Results:"
          echo "• Detected target remote branch for this operation: [ $REMOTE_BRANCH ]"
          echo ""
          echo "📌 To ensure absolute safety in multi-branch collaboration, please copy and execute the following explicit command aligned with your current branch:"
          echo ""
          echo "   👉  git push origin ${REMOTE_BRANCH}:${REMOTE_BRANCH}"
          echo ""
          echo "======================================================================"
          
          # Force the step to fail, blocking subsequent automated pipelines or PR merges
          exit 1
